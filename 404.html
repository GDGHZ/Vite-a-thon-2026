<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Redirecting to Vibe-a-thon 2026</title>
</head>
<body>
  <script>
    const oldPrefix = '/Vite-a-thon-2026/';
    const newBase = 'https://gdghz.github.io/Vibe-a-thon-2026/';
    const rest = location.pathname.startsWith(oldPrefix)
      ? location.pathname.slice(oldPrefix.length)
      : '';

    location.replace(newBase + rest + location.search + location.hash);
  </script>
  <p>
    页面已迁移到
    <a href="https://gdghz.github.io/Vibe-a-thon-2026/">Vibe-a-thon 2026</a>
  </p>
</body>
</html>
